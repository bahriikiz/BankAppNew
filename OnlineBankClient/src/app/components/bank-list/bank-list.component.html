<div class="container mt-5 mb-5">
  <div class="card shadow border-0 rounded-4">
    <div class="card-header text-white" style="background-color: #A90432;">
      <h4 class="mb-0 py-2"><i class="bi bi-bank2 me-2"></i> Banka Listesi ve EFT Kodları</h4>
    </div>
    
    <div class="card-body p-4 bg-light">
      
      <div class="row mb-4">
        <div class="col-md-8 offset-md-2">
          <div class="input-group input-group-lg shadow-sm">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
            <input type="text" class="form-control border-start-0 ps-0" placeholder="Banka adı veya kodu ara..." [(ngModel)]="searchTerm" (input)="filterBanks()">
          </div>
        </div>
      </div>

      <div *ngIf="isLoading()" class="text-center my-5" style="color: #A90432;">
        <div class="spinner-border" style="width: 3rem; height: 3rem;" aria-hidden="true"></div>
        <div class="mt-2 fw-medium fs-5">Bankalar yükleniyor...</div>
      </div>

      <div class="table-responsive bg-white rounded shadow-sm" *ngIf="!isLoading()">
        <table class="table table-hover table-borderless align-middle mb-0">
          <thead class="table-light text-muted border-bottom">
            <tr>
              <th scope="col" class="ps-4">Banka Bilgileri</th>
              <th scope="col" class="text-center">Banka Kodu</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let bank of filteredBanks" class="border-bottom">
              <td class="ps-4 py-3">
                <div class="fw-bold text-dark">
                  <i class="bi bi-building me-2 text-muted"></i>{{ bank.BankName || bank.bankName }}
                </div>
                <div class="small text-muted mt-1 ms-4" *ngIf="bank.BankAddress || bank.bankAddress">
                  📍 {{ bank.BankAddress || bank.bankAddress }}
                </div>
              </td>
              <td class="text-center py-3">
                <span class="badge bg-secondary bg-opacity-10 text-dark border rounded-pill px-3 py-2 fs-6">
                  {{ bank.BankCode || bank.bankCode }}
                </span>
              </td>
            </tr>
            <tr *ngIf="filteredBanks.length === 0">
              <td colspan="2" class="text-center text-muted py-5">
                <i class="bi bi-info-circle fs-3 d-block mb-2"></i> 
                Aradığınız kriterde banka bulunamadı.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
